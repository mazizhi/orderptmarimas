<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Order Barang - PT Marimas</title>
<style>
:root{--g:#25D366;--gd:#128C7E;--pu:#e65100;--pd:#bf360c}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:#2d3748;min-height:100vh}
.hdr{background:linear-gradient(135deg,var(--pu),var(--pd));color:white;padding:18px 16px 14px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(230,81,0,.35)}
.hdr h1{font-size:1.15rem;font-weight:700;margin-bottom:3px}
.hdr .sub{font-size:.8rem;opacity:.88}
.hdr .tgl{font-size:.76rem;opacity:.72;margin-top:2px}
.info{background:#fff8e1;border-bottom:2px solid #ffe082;padding:11px 16px;font-size:.83rem;color:#795548;line-height:1.65}
.info b{color:#e65100}
.ps{margin:12px}
.pl{background:linear-gradient(135deg,var(--pu),var(--pd));color:white;padding:9px 14px;border-radius:10px 10px 0 0;font-size:.85rem;font-weight:700;display:flex;justify-content:space-between;align-items:center}
.pl .st{font-size:.74rem;background:rgba(255,255,255,.22);padding:2px 10px;border-radius:10px}
.vg{background:white;border-radius:0 0 12px 12px;padding:10px;display:grid;grid-template-columns:repeat(2,1fr);gap:8px;box-shadow:0 3px 12px rgba(0,0,0,.07)}
.vc{border-radius:10px;border:2.5px solid #e2e8f0;background:#f8fafc;padding:10px 8px 8px;cursor:pointer;position:relative;display:flex;flex-direction:column;align-items:center;text-align:center;min-height:80px;justify-content:center;user-select:none;-webkit-user-select:none;transition:all .12s ease}
.vc:active{transform:scale(.93)}
.vc.on{border-color:var(--pu);background:#fff3e0}
.vn{font-size:.82rem;font-weight:600;color:#4a5568;line-height:1.3;margin-bottom:4px}
.vc.on .vn{color:#7f1d1d}
.vs{font-size:.7rem;color:#a0aec0;margin-bottom:5px}
.sh{color:#e53935;font-weight:700}.sm{color:#e65100;font-weight:700}.sa{color:#38a169}
.ob{position:absolute;top:-8px;right:-8px;background:var(--pu);color:white;font-size:.82rem;font-weight:800;width:26px;height:26px;border-radius:50%;display:none;align-items:center;justify-content:center;border:2px solid white;box-shadow:0 2px 6px rgba(230,81,0,.5)}
.vc.on .ob{display:flex}
@keyframes pp{0%{transform:scale(.5)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.pp{animation:pp .22s ease}
.rw{margin:0 12px 12px;background:white;border-radius:12px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,.07)}
.rh{padding:12px 14px;background:#f7fafc;border-bottom:1px solid #e2e8f0;font-weight:700;font-size:.9rem;color:#4a5568;display:flex;justify-content:space-between;align-items:center}
.rc{background:var(--pu);color:white;font-size:.75rem;padding:2px 10px;border-radius:10px}
.rb{padding:10px 14px}
.re{color:#cbd5e0;font-size:.85rem;text-align:center;padding:12px 0}
.ri{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f7fafc;font-size:.85rem}
.ri:last-child{border:none}
.rn{color:#4a5568}.rj{font-weight:700;color:var(--pd)}
.bra{width:calc(100% - 24px);margin:0 12px 12px;padding:11px;background:#fff0f0;color:#e53935;border:2px solid #fca5a5;border-radius:10px;font-size:.88rem;font-weight:600;cursor:pointer;display:block}
.sp{height:90px}
.fb{position:fixed;bottom:0;left:0;right:0;background:white;padding:12px 16px;box-shadow:0 -3px 15px rgba(0,0,0,.1);z-index:100}
.bk{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));color:white;border:none;border-radius:13px;padding:16px;font-size:1rem;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .2s}
.bk:disabled{background:#cbd5e0;cursor:not-allowed}
.cp{background:rgba(255,255,255,.28);padding:3px 11px;border-radius:12px;font-size:.85rem}
.wo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center}
.ws{background:white;width:100%;max-width:600px;border-radius:20px 20px 0 0;padding:20px 18px 36px;max-height:88vh;overflow-y:auto}
.wh{width:40px;height:4px;background:#e2e8f0;border-radius:2px;margin:0 auto 16px}
.wt{font-size:1.05rem;font-weight:700;color:var(--gd);margin-bottom:12px}
.wp{background:#dcf8c6;border-radius:12px;padding:14px;white-space:pre-wrap;font-size:.86rem;line-height:1.75;color:#2d3748;margin-bottom:14px;max-height:260px;overflow-y:auto;border:1px solid #c8e6c9}
.bs{width:100%;background:linear-gradient(135deg,var(--g),var(--gd));color:white;border:none;border-radius:12px;padding:15px;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:9px;display:block}
.bc{width:100%;background:#FF9800;color:white;border:none;border-radius:12px;padding:13px;font-size:.95rem;cursor:pointer;margin-bottom:9px;display:block}
.bx{width:100%;background:#edf2f7;color:#718096;border:none;border-radius:12px;padding:13px;font-size:.95rem;cursor:pointer;display:block}
</style>
</head>
<body>
<div id="root"></div>
<div class="wo" id="wo">
<div class="ws">
<div class="wh"></div>
<div class="wt">📱 Preview Pesan ke Sales</div>
<div class="wp" id="wp"></div>
<button class="bs" id="bs">📱 Buka WhatsApp & Kirim ke Sales</button>
<button class="bc" id="bc">📋 Salin Pesan</button>
<button class="bx" onclick="document.getElementById('wo').style.display='none'">✕ Tutup</button>
</div>
</div>
<script>
const D={"tgl":"2026-04-30T00:04:25.333Z","produk":[{"name":"MARIMAS","variants":[{"name":"JERUK","stock":1},{"name":"BLACK CURRANT","stock":1},{"name":"GULA ASEM","stock":2},{"name":"SIRSAK","stock":3},{"name":"STROBERI","stock":1},{"name":"JERMAN","stock":1},{"name":"MELON","stock":1},{"name":"COCOPANDAN","stock":2},{"name":"FRAMBOZE","stock":3},{"name":"MANGGA","stock":0},{"name":"NANAS MADU","stock":0},{"name":"JAMBU BIJI","stock":0},{"name":"ANGGUR","stock":0},{"name":"KELAPA MUDA","stock":1},{"name":"JERUK PERAS (JEPE)","stock":2},{"name":"KELAPA PANDAN WANGI","stock":1},{"name":"JERUK PONTIANAK","stock":1},{"name":"MANGGA ARUMANIS","stock":2},{"name":"JERUK NIPIS","stock":1},{"name":"RUJAK MANIS","stock":2},{"name":"CINCAU","stock":2},{"name":"SWEET MANGO","stock":0},{"name":"PINK LECI","stock":0},{"name":"MANGGA BANGKOK","stock":0},{"name":"ANGGUR MERAH","stock":0},{"name":"NANAS","stock":0},{"name":"ES TELER","stock":0},{"name":"BLEWAH","stock":0},{"name":"ES KOPI","stock":0},{"name":"APEL MANIS","stock":0},{"name":"MANGGA MANIS","stock":2},{"name":"CENDOL DAWET","stock":2},{"name":"BLUEBERRY","stock":1}]},{"name":"COCORIO","variants":[{"name":"Coklat","stock":2},{"name":"Es Kopi","stock":1},{"name":"Chocorio","stock":2},{"name":"Cappuccino","stock":1},{"name":"Taro","stock":2},{"name":"White Kofie","stock":1},{"name":"Choco Go","stock":0},{"name":"Chocotime","stock":1},{"name":"Dark Choco","stock":1},{"name":"Choco Avocado","stock":1},{"name":"Kori Moka","stock":2},{"name":"Es Kopyor","stock":2},{"name":"Banana","stock":1},{"name":"Malto","stock":2},{"name":"Es Teler","stock":2},{"name":"Kopi Avocado","stock":1},{"name":"Milky Stroberi","stock":1},{"name":"Vanilla Blue","stock":0},{"name":"Milky Banana","stock":2},{"name":"Milky Melon","stock":1},{"name":"Milky Mango","stock":2},{"name":"Bubble Gum","stock":2}]},{"name":"OPPA CANDY","variants":[{"name":"COKLAT","stock":2},{"name":"TARO","stock":1},{"name":"BANANA","stock":2},{"name":"STROBERI","stock":1},{"name":"MELON","stock":1},{"name":"CHOCOMALT","stock":1},{"name":"BUBBLE GUM","stock":1},{"name":"VANILLA","stock":0},{"name":"CHOCORIO","stock":1},{"name":"DARK CHOCO","stock":1},{"name":"MOCCANINO","stock":2},{"name":"MANGGO YOGHURT","stock":2},{"name":"STROBERI YOGHURT","stock":1},{"name":"BLUBERI YOGHURT","stock":2},{"name":"RAINBOW","stock":1}]},{"name":"MARI OPPA","variants":[{"name":"Coklat","stock":1},{"name":"Taro","stock":2},{"name":"Banana","stock":2},{"name":"Strawberry","stock":2},{"name":"Melon","stock":2},{"name":"Manggo Yoghurt","stock":1},{"name":"Lechee Peach Yoghurt","stock":1},{"name":"Vanilla","stock":1},{"name":"Blue Velvet","stock":4},{"name":"Matcha","stock":3},{"name":"Dark Choco","stock":1}]}]};
const O={};
function r(){
const root=document.getElementById('root');
const tgl=new Date(D.tgl).toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
let h=`<div class="hdr"><h1>🛒 Order Barang - PT Marimas</h1><div class="sub">Tap barang yang mau di-order. Tap lagi = tambah jumlah.</div><div class="tgl">📅 Data stok: ${tgl}</div></div>
<div class="info">👆 <b>Tap nama barang</b> untuk order. Tap <b>berkali-kali</b> untuk tambah jumlah.<br>Tap terus sampai angka balik ke 0 untuk batal.</div>`;
D.produk.forEach((p,pi)=>{
const ts=p.variants.reduce((t,v)=>t+v.stock,0);
h+=`<div class="ps"><div class="pl"><span>📦 ${p.name}</span><span class="st">Stok: ${ts}</span></div><div class="vg">`;
p.variants.forEach((v,vi)=>{
const sc=v.stock===0?'sh':v.stock<=3?'sm':'sa';
const sl=v.stock===0?'⚠ HABIS':v.stock<=3?`⚡ ${v.stock} sisa`:`✓ ${v.stock}`;
h+=`<div class="vc" id="c${pi}_${vi}" onclick="t(${pi},${vi},'${e(p.name)}','${e(v.name)}')"><div class="ob" id="b${pi}_${vi}">0</div><div class="vn">${v.name}</div><div class="vs ${sc}">${sl}</div></div>`;
});
h+=`</div></div>`;
});
h+=`<div class="rw"><div class="rh">🧾 Ringkasan Order<span class="rc" id="rc">0 item</span></div><div class="rb" id="rb"><p class="re">Belum ada barang dipilih</p></div></div>
<button class="bra" onclick="rst()">🗑 Reset Semua Pilihan</button>
<div class="sp"></div>
<div class="fb"><button class="bk" id="bk" onclick="wa()" disabled>📱 Kirim Order ke Sales via WhatsApp<span class="cp" id="cp">0 item</span></button></div>`;
root.innerHTML=h;
}
function e(s){return s.replace(/\\/g,'\\\\').replace(/'/g,"\\'")}
function t(pi,vi,pn,vn){
const k=pn+'|'+vn,prev=O[k]||0;
O[k]=prev>=20?0:prev+1;
if(!O[k])delete O[k];
const jml=O[k]||0,c=document.getElementById('c'+pi+'_'+vi),b=document.getElementById('b'+pi+'_'+vi);
if(c){jml>0?c.classList.add('on'):c.classList.remove('on');}
if(b){b.textContent=jml;b.classList.remove('pp');void b.offsetWidth;b.classList.add('pp');}
u();
}
function u(){
const ks=Object.keys(O).filter(k=>O[k]>0),n=ks.length;
const rc=document.getElementById('rc'),cp=document.getElementById('cp'),bk=document.getElementById('bk'),rb=document.getElementById('rb');
if(rc)rc.textContent=n+' item';if(cp)cp.textContent=n+' item';if(bk)bk.disabled=n===0;
if(!rb)return;
rb.innerHTML=n===0?'<p class="re">Belum ada barang dipilih</p>':ks.map(k=>{const[p,v]=k.split('|');return '<div class="ri"><span class="rn">'+p+' – '+v+'</span><span class="rj">'+O[k]+' pack</span></div>';}).join('');
}
function rst(){
if(!confirm('Reset semua pilihan?'))return;
Object.keys(O).forEach(k=>delete O[k]);
document.querySelectorAll('.vc').forEach(c=>c.classList.remove('on'));
document.querySelectorAll('.ob').forEach(b=>b.textContent='0');
u();
}
function wa(){
const ks=Object.keys(O).filter(k=>O[k]>0);
if(!ks.length){alert('Belum ada barang dipilih!');return;}
const tgl=new Date().toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'});
const g={};ks.forEach(k=>{const[p,v]=k.split('|');if(!g[p])g[p]=[];g[p].push({v,j:O[k]});});
let m='🛒 *ORDER BARANG PT MARIMAS - '+tgl+'*\n━━━━━━━━━━━━━━━━━━━\n\n';
Object.keys(g).forEach(p=>{m+='📦 *'+p+'*\n';g[p].forEach(i=>{m+='   • '+i.v+' → *'+i.j+' pack*\n';});m+='\n';});
m+='━━━━━━━━━━━━━━━━━━━\n📋 Total: *'+ks.length+' item*\n\nMohon segera diproses. Terima kasih 🙏';
document.getElementById('wp').textContent=m;
document.getElementById('wo').style.display='flex';
document.getElementById('bs').onclick=()=>window.open('https://wa.me/?text='+encodeURIComponent(m),'_blank');
document.getElementById('bc').onclick=()=>navigator.clipboard.writeText(m).then(()=>alert('Pesan disalin!'));
}
r();
</script>
</body>
</html>
